<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="description" content="{head.meta.description}" />
    <meta name="keywords" content="{head.meta.keywords}" />

    <meta property="og:title" content="{head.meta.title}" />
    <meta property="og:description" content="{head.meta.description}" />
    <meta property="og:image" content="{CDN_URL}/commons/gonzaloarenasf-logo.png" />
    <meta property="og:url" content="{ENV_URL}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{head.meta.title}" />
    <meta name="twitter:description" content="{head.meta.description}" />
    <meta name="twitter:image" content="{CDN_URL}/commons/gonzaloarenasf-logo.png" />

    <link rel="canonical" href="{ENV_URL}" />
    <link rel="stylesheet" href="404.css" />
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/site.webmanifest" />

    <script type="module" src="404.js?v={APP_VERSION}"></script>

    <title>{head.title}</title>
  </head>
  <body class="light-mode">
    <main>
      <figure>
        <bap-logo type="isologoVertical" size="x3" color-mode="light"></bap-logo>
      </figure>
      <p>{body.message}</p>
      <a href="/">{body.backHome}</a>
    </main>
  </body>
</html>
