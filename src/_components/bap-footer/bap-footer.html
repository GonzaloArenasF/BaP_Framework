<div class="bap-footer-wrapper">
  <div class="bap-footer-main">
    <div class="bap-footer-brand">
      <div class="bap-footer-logo">
        <span>BaP Framework</span>
      </div>
      <p class="bap-footer-brand-desc">{brandDesc}
      </p>
      <div class="bap-footer-version-tag">
        <span>{versionLabel}</span>
        <strong>{APP_VERSION}</strong>
      </div>
    </div>

    <div class="bap-footer-links">
      <h5>{resourcesLabel}</h5>
      <a href="https://github.com/GonzaloArenasF/BaP_Framework" target="_blank" aria-label="repositorio de github">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.08-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.18 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z" />
        </svg>
        GitHub Repository
      </a>
      <a href="#playground">
        {btnExplore}
      </a>
    </div>

    <div class="bap-footer-contact">
      <h5>{contactLabel}</h5>
      <a href="mailto:{socialMedia.email.url}" target="_blank" aria-label="email de contacto"
        class="bap-footer-email-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
          <path d="M22 6l-10 7L2 6" />
        </svg>
        {socialMedia.email.url}
      </a>
    </div>
  </div>

  <div class="bap-footer-bottom">
    <p class="bap-footer-copy">{tc}</p>
  </div>
</div>
